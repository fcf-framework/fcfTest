name: C++ Multi-Standard CI

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build_and_test:
    name: ${{ matrix.runner_os }} | C++${{ matrix.cpp_std }}${{ matrix.msvc_suffix }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner_os: ubuntu-latest
            cpp_std: 11
          - os: ubuntu-latest
            runner_os: ubuntu-latest
            cpp_std: 14
          - os: ubuntu-latest
            runner_os: ubuntu-latest
            cpp_std: 17
          - os: ubuntu-latest
            runner_os: ubuntu-latest
            cpp_std: 20
          - os: ubuntu-latest
            runner_os: ubuntu-latest
            cpp_std: 23

          - os: macos-latest
            runner_os: macos-latest
            cpp_std: 11
          - os: macos-latest
            runner_os: macos-latest
            cpp_std: 14
          - os: macos-latest
            runner_os: macos-latest
            cpp_std: 17
          - os: macos-latest
            runner_os: macos-latest
            cpp_std: 20
          - os: macos-latest
            runner_os: macos-latest
            cpp_std: 23

          - os: windows-latest
            runner_os: windows-latest
            cpp_std: 17
          - os: windows-latest
            runner_os: windows-latest
            cpp_std: 20
          - os: windows-latest
            runner_os: windows-latest
            cpp_std: 23

          - os: windows-2022
            runner_os: windows-2022
            cpp_std: 11
            msvc_suffix: " (MSVC12)"
            install_cmd: "choco install microsoft-build-tools-2013 -y"
            toolset_version: "12.0"

          - os: windows-2022
            runner_os: windows-2022
            cpp_std: 14
            msvc_suffix: " (MSVC14)"
            install_cmd: "choco install microsoft-visual-cpp-build-tools -y --allow-empty-checksums"
            toolset_version: "14.0"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Legacy MSVC Toolset (Windows Only)
      if: matrix.install_cmd != null && matrix.install_cmd != ''
      shell: powershell
      run: ${{ matrix.install_cmd }}

    - name: Set up Legacy MSVC Environment
      if: matrix.toolset_version != null
      uses: egor-tensin/setup-msvc@v1
      with:
        toolset: ${{ matrix.toolset_version }}
        platform: x64

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_CXX_STANDARD=${{ matrix.cpp_std }}
        -DCMAKE_CXX_STANDARD_REQUIRED=ON

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          if [ -f "./test/Release/fcf-test-test.exe" ]; then
            ./test/Release/fcf-test-test.exe --test-file-junit junit-report.xml
          else
            ./test/fcf-test-test.exe --test-file-junit junit-report.xml
          fi
        else
          ./test/fcf-test-test --test-file-junit junit-report.xml
        fi

    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: always()
      with:
        report_paths: '${{github.workspace}}/build/junit-report.xml'
        detailed_summary: true
        include_passed_tests: true

