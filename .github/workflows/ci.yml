name: C++ Multi-Standard CI

on:
  push:
    branches: [ "development" ]
  pull_request:
    branches: [ "development" ]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build_and_test:
    name: ${{ matrix.os }} | C++${{ matrix.cpp_std }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        cpp_std: [11, 14, 17, 20, 23]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_CXX_STANDARD=${{ matrix.cpp_std }}
        -DCMAKE_CXX_STANDARD_REQUIRED=ON

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./test/Release/fcf-test-test.exe --test-file-junit junit-report.xml
        else
          ./test/fcf-test-test --test-file-junit junit-report.xml
        fi

    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: always()
      with:
        report_paths: '${{github.workspace}}/build/junit-report.xml'
        detailed_summary: true
        include_passed_tests: true

