name: C++ Multi-Standard CI

on:
  push:
    branches: [ "development", "main" ]
  pull_request:
    branches: [ "development", "main" ]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build_and_test:
    name: ${{ matrix.os }} | ${{ matrix.arch }} | C++${{ matrix.cpp_std }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022, windows-2025]
        cpp_std: [11, 14, 17, 20, 23]
        arch: [x64, x86]
        exclude:
          - os: macos-latest
            arch: x86
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install x86 multilib (Ubuntu)
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'x86'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib

    - name: Configure CMake
      shell: bash
      run: |
        CMAKE_FLAGS=(
          "-B" "${{github.workspace}}/build"
          "-DCMAKE_BUILD_TYPE=Release"
          "-DCMAKE_CXX_STANDARD=${{ matrix.cpp_std }}"
          "-DCMAKE_CXX_STANDARD_REQUIRED=ON"
        )

        if [ "${{ matrix.os }}" == "windows-2022" ] || [ "${{ matrix.os }}" == "windows-2025" ]; then
          if [ "${{ matrix.arch }}" == "x86" ]; then
            CMAKE_FLAGS+=("-A" "Win32")
          else
            CMAKE_FLAGS+=("-A" "x64")
          fi
        elif [ "${{ matrix.os }}" == "ubuntu-latest" ] && [ "${{ matrix.arch }}" == "x86" ]; then
          CMAKE_FLAGS+=("-DCMAKE_CXX_FLAGS=-m32" "-DCMAKE_C_FLAGS=-m32")
        fi

        cmake "${CMAKE_FLAGS[@]}"

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./test/Release/fcf-test-test.exe --test-file-junit junit-report.xml
        else
          ./test/fcf-test-test --test-file-junit junit-report.xml
        fi

    - name: Publish Test Results
      uses: mikepenz/action-junit-report@v5
      if: always()
      with:
        report_paths: '${{github.workspace}}/build/junit-report.xml'
        detailed_summary: true
        include_passed_tests: true

