name: Create Release

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed

jobs:
  release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare and Archive Sources
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          VERSION=${TAG_NAME#v}
          echo "Version to use: $VERSION"

          mkdir -p fcfTest
          rsync -rrv --exclude='fcfTest' --exclude='.git' --exclude='.github' ./ fcfTest/
          zip -r "fcfTest-${VERSION}.zip" fcfTest/
          echo "ARCHIVE_NAME=fcfTest-${VERSION}.zip" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          generate_release_notes: true
          files: ${{ env.ARCHIVE_NAME }}

